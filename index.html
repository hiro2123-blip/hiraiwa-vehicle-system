<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIRAIWA 車両・店舗業務管理システム (Ver.3 店舗選択対応版)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; padding: 15px; min-height: 100vh; transition: background-color 0.3s; }
        .container { width: 100%; max-width: 1100px; margin: 0 auto; }
        
        .page { display: none; }
        .page.active { display: block; }

        /* ヘッダーエリア */
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1e293b; padding-bottom: 12px; margin-bottom: 20px; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .system-title { font-size: 16pt; font-weight: bold; color: #38bdf8; letter-spacing: 1px; }
        .store-badge { background: #1e293b; color: #38bdf8; border: 1px solid #38bdf8; padding: 3px 10px; border-radius: 6px; font-size: 9pt; font-weight: bold; }
        .user-info { font-size: 9.5pt; color: #94a3b8; display: flex; align-items: center; gap: 10px; }
        
        .btn-toggle-role { background: #334155; color: #cbd5e1; border: none; padding: 4px 8px; font-size: 8pt; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-toggle-role.admin-active { background: #ef4444; color: #fff; box-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }

        /* メインレイアウト */
        .main-layout { display: grid; grid-template-columns: 290px 1fr; gap: 25px; }
        .section-title { font-size: 10pt; text-transform: uppercase; color: #94a3b8; margin-bottom: 12px; font-weight: 600; border-left: 4px solid #38bdf8; padding-left: 8px; }
        
        /* メニューボタン */
        .sidebar { display: flex; flex-direction: column; gap: 12px; }
        .action-card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px 15px; cursor: pointer; transition: all 0.2s ease; text-align: left; }
        .action-card:hover { border-color: #38bdf8; transform: translateY(-2px); }
        .action-header { font-size: 11pt; font-weight: bold; margin-bottom: 4px; }
        .btn-cust .action-header { color: #38bdf8; }
        .btn-search .action-header { color: #fbbf24; }
        .btn-shaken .action-header { color: #f87171; }
        .btn-info .action-header { color: #60a5fa; }
        .action-desc { font-size: 8pt; color: #94a3b8; line-height: 1.4; }

        /* コンパクトカレンダー */
        .calendar-container { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 15px; }
        .calendar-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .calendar-table th { padding: 6px 0; font-size: 8.5pt; color: #94a3b8; text-align: center; border-bottom: 2px solid #334155; }
        .calendar-table td { height: 75px; border: 1px solid #334155; padding: 4px; vertical-align: top; }
        .day-num { font-size: 8.5pt; font-weight: bold; color: #cbd5e1; margin-bottom: 3px; }
        .sun .day-num { color: #f87171; }
        .sat .day-num { color: #60a5fa; }

        /* フォーム共通 */
        .form-section { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 25px; margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group.full-width { grid-column: span 2; }
        label { font-size: 9pt; color: #94a3b8; font-weight: 600; }
        input[type="text"], input[type="tel"], input[type="date"], input[type="number"], select, textarea { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 6px; padding: 10px; color: #f8fafc; font-size: 10pt; }
        
        .btn-back-nav { background: #1e293b; color: #94a3b8; border: 1px solid #334155; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-bottom: 15px; }
        .btn-submit-form { color: #0f172a; border: none; padding: 12px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; font-size: 10.5pt; }
        
        /* テーブル */
        .result-table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 8px; overflow: hidden; margin-top: 15px; }
        .result-table th, .result-table td { padding: 12px 10px; text-align: left; font-size: 9pt; border-bottom: 1px solid #334155; vertical-align: middle; }
        
        /* ボタン */
        .action-btn-group { display: flex; gap: 8px; align-items: center; }
        .btn-instant-work { background: #fbbf24; color: #0f172a; border: none; padding: 7px 14px; font-size: 8.5pt; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .btn-view-history { background: #38bdf8; color: #0f172a; border: none; padding: 7px 14px; font-size: 8.5pt; font-weight: bold; border-radius: 4px; cursor: pointer; }
        
        /* 履歴表示エリア */
        .history-wrapper { display: none; margin-top: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; padding: 12px; font-size: 8.5pt; color: #cbd5e1; width: 100%; grid-column: span 3; }
        .history-item { border-bottom: 1px dashed #1e293b; padding: 8px 0; }
        .history-meta { display: flex; justify-content: space-between; font-weight: bold; color: #f8fafc; margin-bottom: 3px; }
    </style>
</head>
<body>

    <div class="container">
        <!-- ヘッダー -->
        <header>
            <div class="header-left">
                <span class="system-title">HIRAIWA VEHICLE MANAGEMENT</span>
                <span class="store-badge" id="store-badge">朝霞店</span>
            </div>
            <div class="header-right">
                <div class="user-info">
                    <span>ログイン: <strong style="color:#fff;">相原 広史 様</strong></span>
                    <button class="btn-toggle-role" id="role-toggle" onclick="toggleAdminMode()">一般スタッフ(朝霞店) 🔄</button>
                </div>
            </div>
        </header>

        <!-- ① トップ画面 -->
        <div id="page-top" class="page active">
            <div class="main-layout">
                <div class="sidebar">
                    <div class="section-title">メニュー</div>
                    <div class="action-card btn-cust" onclick="showPage('page-cust')"><div class="action-header">🆕 顧客登録</div></div>
                    <div class="action-card btn-search" onclick="showPage('page-search')"><div class="action-header">🔍 車両検索 / 作業記録</div></div>
                    <div class="action-card btn-shaken" onclick="showPage('page-shaken-reg')"><div class="action-header">📋 車検予約</div></div>
                    <div class="action-card btn-info" onclick="showPage('page-plan-reg')"><div class="action-header">📅 一般予約</div></div>
                </div>
                <div class="calendar-container"><table class="calendar-table"><tbody id="calendar-body"></tbody></table></div>
            </div>
        </div>

        <!-- ② 顧客登録画面 -->
        <div id="page-cust" class="page">
            <button class="btn-back-nav" onclick="showPage('page-top')">← トップに戻る</button>
            <form id="form-customer" onsubmit="submitCustomer(event)">
                <div class="form-section">
                    <div class="section-title">顧客・車両情報</div>
                    <div class="form-grid">
                        <div class="form-group"><label>お名前</label><input type="text" id="cust-name" required></div>
                        <div class="form-group"><label>担当店舗</label>
                            <select id="cust-store">
                                <option>板橋ss</option><option>セルフ志村ss</option><option>小茂根ss</option>
                                <option>セルフ赤羽西ss</option><option>東坂下ss</option><option>セルフ高島平ss</option>
                                <option>武蔵関ss</option><option>上板工場</option>
                            </select>
                        </div>
                        <div class="form-group full-width"><label>ナンバー</label><input type="text" id="car-number" required></div>
                    </div>
                    <button type="submit" class="btn-submit-form" style="background:#38bdf8;">登録する</button>
                </div>
            </form>
        </div>

        <!-- ③ 車両検索 画面 -->
        <div id="page-search" class="page">
            <button class="btn-back-nav" onclick="showPage('page-top')">← トップに戻る</button>
            <div class="form-section">
                <div class="form-group"><label>車両ナンバー検索</label><input type="text" id="search-car-number"></div>
                <button class="btn-submit-form" style="background:#fbbf24;" onclick="simulateSearchAction()">検索する</button>
            </div>
            <table class="result-table">
                <thead><tr><th>店舗 / 顧客名</th><th>ナンバー</th><th>操作</th></tr></thead>
                <tbody id="search-table-rows"></tbody>
            </table>
        </div>

        <!-- ④ 突発の実績登録画面 -->
        <div id="page-instant-work" class="page">
            <button class="btn-back-nav" onclick="showPage('page-search')">← 検索結果に戻る</button>
            <form id="form-work" onsubmit="submitWork(event)">
                <div class="form-section">
                    <div class="form-group"><label>実施店舗</label>
                        <select id="work-location">
                            <option>板橋ss</option><option>セルフ志村ss</option><option>小茂根ss</option>
                            <option>セルフ赤羽西ss</option><option>東坂下ss</option><option>セルフ高島平ss</option>
                            <option>武蔵関ss</option><option>上板工場</option>
                        </select>
                    </div>
                    <div class="form-group"><label>走行距離</label><input type="number" id="work-mileage" required></div>
                    <button type="submit" class="btn-submit-form" style="background:#34d399;">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbynK7l25JCIb16o2W8qbafxJTu5y9NcggF400c22cNOHgMyiZ64MRWh0U8OIvZ4ubDD/exec";
        function toNormalizeStandard(str) { return str ? str.replace(/[Ａ-Ｚａ-ｚ０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).toLowerCase() : ""; }
        function toggleHistoryBox(id) { const el = document.getElementById(id); el.style.display = el.style.display === "block" ? "none" : "block"; }

        function simulateSearchAction() {
            const tbody = document.getElementById('search-table-rows');
            const inputVal = toNormalizeStandard(document.getElementById('search-car-number').value);
            
            fetch(GAS_URL + "?op=searchCustomers")
            .then(res => res.json())
            .then(custData => {
                fetch(GAS_URL + "?op=getCalendarData")
                .then(res => res.json())
                .then(historyData => {
                    tbody.innerHTML = "";
                    custData.filter(item => inputVal === "" || toNormalizeStandard(item.carNumber).includes(inputVal)).forEach((item, idx) => {
                        let tr = document.createElement('tr');
                        const boxId = `history-box-${idx}`;
                        
                        let matchedWorks = historyData.work.filter(w => toNormalizeStandard(w[2]).includes(toNormalizeStandard(item.carNumber))).sort((a,b) => new Date(b[3]) - new Date(a[3]));
                        let historyHtml = `<div class="history-wrapper" id="${boxId}"><div class="history-title-banner">過去実績</div>`;
                        matchedWorks.forEach(w => historyHtml += `<div class="history-item"><div class="history-meta"><span>📅 ${w[3]}</span><span>⚡ ${w[5]}km</span></div><div>${w[4]}</div></div>`);
                        historyHtml += `</div>`;

                        tr.innerHTML = `<td>[${item.store}]<br><strong>${item.name} 様</strong></td><td>${item.carNumber}</td>
                        <td><div class="action-btn-group"><button class="btn-view-history" onclick="toggleHistoryBox('${boxId}')">📋 履歴</button><button class="btn-instant-work" onclick="openInstantWork('${item.name}', '${item.carNumber}')">⚡ 登録</button></div>${historyHtml}</td>`;
                        tbody.appendChild(tr);
                    });
                });
            });
        }
    </script>
</body>
</html>
