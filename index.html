<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIRAIWA 車両・店舗業務管理システム (Ver.5 完全検証版)</title>
    <style>
        /* 基礎リセット */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; padding: 15px; min-height: 100vh; }
        .container { width: 100%; max-width: 1100px; margin: 0 auto; }
        
        /* ページ切り替え */
        .page { display: none; }
        .page.active { display: block !important; }

        /* ヘッダーエリア */
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1e293b; padding-bottom: 12px; margin-bottom: 20px; }
        .header-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .system-title { font-size: 16pt; font-weight: bold; color: #38bdf8; letter-spacing: 1px; }
        .version-badge { color: #34d399; font-size: 10pt; font-weight: bold; border: 1px solid #34d399; padding: 2px 6px; border-radius: 4px; }
        .store-badge { background: #1e293b; color: #38bdf8; border: 1px solid #38bdf8; padding: 3px 10px; border-radius: 6px; font-size: 9pt; font-weight: bold; }
        .user-info { font-size: 9.5pt; color: #94a3b8; display: flex; align-items: center; gap: 10px; }
        
        .btn-toggle-role { background: #334155; color: #cbd5e1; border: none; padding: 4px 8px; font-size: 8pt; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* 店舗選択クイックボタン */
        .btn-store-pick {
            background: #1e293b;
            color: #94a3b8;
            border: 1px solid #334155;
            padding: 4px 10px;
            font-size: 8.5pt;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-store-pick:hover {
            border-color: #38bdf8;
            color: #f8fafc;
        }
        .btn-store-pick.active {
            background: #38bdf8;
            color: #0f172a;
            border-color: #38bdf8;
        }
        .admin-mode #store-quick-selectors {
            display: none !important;
        }

        /* メインレイアウト */
        .main-layout { display: grid; grid-template-columns: 290px 1fr; gap: 25px; }
        .section-title { font-size: 10pt; text-transform: uppercase; color: #94a3b8; margin-bottom: 12px; font-weight: 600; border-left: 4px solid #38bdf8; padding-left: 8px; }

        /* メニューボタン */
        .sidebar { display: flex; flex-direction: column; gap: 12px; }
        .action-card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px 15px; cursor: pointer; width: 100%; display: block; text-align: left; }
        .action-card:hover { border-color: #38bdf8; }
        .action-header { font-size: 11pt; font-weight: bold; margin-bottom: 4px; pointer-events: none; }
        .btn-cust .action-header { color: #38bdf8; }
        .btn-search .action-header { color: #fbbf24; }
        .btn-shaken .action-header { color: #f87171; }
        .btn-info .action-header { color: #60a5fa; }
        .action-desc { font-size: 8pt; color: #94a3b8; line-height: 1.4; pointer-events: none; }

        /* カレンダーエリア */
        .calendar-section { width: 100%; }
        .calendar-container { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 15px; width: 100%; display: block !important; }
        .calendar-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .calendar-table th { padding: 8px 0; font-size: 8.5pt; color: #94a3b8; text-align: center; border-bottom: 2px solid #334155; }
        .calendar-table td { height: 85px; border: 1px solid #334155; padding: 6px; vertical-align: top; background: #1e293b; }
        .day-num { font-size: 9pt; font-weight: bold; color: #cbd5e1; margin-bottom: 4px; }
        .sun .day-num { color: #f87171; }
        .sat .day-num { color: #60a5fa; }
        .other-month { opacity: 0.25; background: #161e2e; }

        .badge-list { display: flex; flex-direction: column; gap: 3px; overflow-y: auto; max-height: 55px; min-height: 20px; }
        .sched-badge { font-size: 7.5pt; padding: 2px 4px; border-radius: 3px; font-weight: bold; display: block; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; line-height: 1.2; cursor: pointer; transition: opacity 0.15s; }
        .sched-badge:hover { opacity: 0.8; }
        .badge-done { background: rgba(52, 211, 153, 0.15); color: #34d399; border: 1px solid rgba(52, 211, 153, 0.3); } 
        .badge-shaken { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); } 
        .badge-plan { background: rgba(96, 165, 250, 0.15); color: #60a5fa; border: 1px solid rgba(60, 165, 250, 0.3); }

        /* フォーム要素 */
        .form-section { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 25px; margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group.full-width { grid-column: span 2; }
        label { font-size: 9pt; color: #94a3b8; font-weight: 600; }
        
        input, select, textarea { 
            width: 100% !important; background: #0f172a !important; border: 1px solid #334155 !important; 
            border-radius: 6px !important; padding: 10px !important; color: #f8fafc !important; font-size: 10pt !important; 
            display: block !important; visibility: visible !important; opacity: 1 !important;
        }
        select { appearance: select !important; -webkit-appearance: select !important; cursor: pointer !important; }
        textarea { height: 80px; resize: none; }
        
        .km-input-wrapper { display: flex; align-items: center; gap: 8px; width: 100%; }
        .km-input-wrapper input { flex-grow: 1; }
        .km-unit { color: #64748b; font-size: 9.5pt; font-weight: bold; }

        /* ナンバー検索・書類リンク用スタイル */
        .btn-inline-search {
            background: #fbbf24; color: #0f172a; border: none; padding: 10px 15px; font-size: 9.5pt; font-weight: bold; border-radius: 6px; cursor: pointer; transition: background 0.15s;
        }
        .btn-inline-search:hover { background: #f59e0b; }
        
        .doc-link { display: inline-block; background: #334155; color: #38bdf8; padding: 5px 10px; border-radius: 4px; text-decoration: none; font-size: 8.5pt; font-weight: bold; margin: 3px; transition: background 0.15s; border: 1px solid #334155; }
        .doc-link:hover { background: #38bdf8; color: #0f172a; border-color: #38bdf8; }

        /* ボタン群 */
        .btn-back-nav { background: #1e293b; color: #94a3b8; border: 1px solid #334155; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-bottom: 15px; }
        .btn-submit-form { color: #0f172a; border: none; padding: 12px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; font-size: 10.5pt; transition: opacity 0.2s; }
        .btn-delete-form { background: #ef4444; color: #ffffff; border: none; padding: 12px; font-weight: bold; border-radius: 6px; cursor: pointer; width: 100%; font-size: 10.5pt; transition: opacity 0.2s; }
        .btn-delete-form:hover { background: #dc2626; }

        /* 結果テーブル */
        .result-table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 8px; overflow: hidden; margin-top: 15px; margin-bottom: 30px; }
        .result-table th, .result-table td { padding: 12px 10px; text-align: left; font-size: 9pt; border-bottom: 1px solid #334155; vertical-align: middle; }
        
        .action-btn-group { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
        .btn-instant-work { background: #34d399; color: #0f172a; border: none; padding: 7px 12px; font-size: 8.5pt; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .btn-view-history { background: #38bdf8; color: #0f172a; border: none; padding: 7px 12px; font-size: 8.5pt; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .btn-shaken-booking { background: #f87171; color: #ffffff; border: none; padding: 7px 12px; font-size: 8.5pt; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .btn-plan-booking { background: #60a5fa; color: #0f172a; border: none; padding: 7px 12px; font-size: 8.5pt; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .btn-edit-admin { background: #fbbf24; color: #0f172a; border: none; padding: 7px 12px; font-size: 8.5pt; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .btn-edit-history { background: #fbbf24; color: #0f172a; border: none; padding: 2px 6px; font-size: 7.5pt; font-weight: bold; border-radius: 3px; cursor: pointer; margin-left: 8px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="header-left">
                <span class="system-title">HIRAIWA VEHICLE MANAGEMENT</span>
                <span class="version-badge" id="version-check">✨Ver.5</span>
                <span class="store-badge" id="store-badge">板橋ss</span>
                
                <div class="store-select-buttons" id="store-quick-selectors" style="display: flex; gap: 4px; margin-left: 8px;">
                    <button type="button" class="btn-store-pick active" onclick="changeCurrentStore('板橋ss', this)">板橋</button>
                    <button type="button" class="btn-store-pick" onclick="changeCurrentStore('セルフ志村ss', this)">志村</button>
                    <button type="button" class="btn-store-pick" onclick="changeCurrentStore('小茂根ss', this)">小茂根</button>
                    <button type="button" class="btn-store-pick" onclick="changeCurrentStore('セルフ赤羽西ss', this)">赤羽西</button>
                    <button type="button" class="btn-store-pick" onclick="changeCurrentStore('東坂下ss', this)">東坂下</button>
                    <button type="button" class="btn-store-pick" onclick="changeCurrentStore('セルフ高島平ss', this)">高島平</button>
                    <button type="button" class="btn-store-pick" onclick="changeCurrentStore('武蔵関ss', this)">武蔵関</button>
                    <button type="button" class="btn-store-pick" onclick="changeCurrentStore('上板工場', this)">上板</button>
                </div>
            </div>
            <div class="header-right">
                <div class="user-info">
                    <span>ログイン: <strong style="color:#fff;">相原 広史 様</strong></span>
                    <button class="btn-toggle-role" id="role-toggle" onclick="toggleAdminMode()">一般スタッフ(板橋ss) 🔄</button>
                </div>
            </div>
        </header>

        <div id="page-top" class="page active">
            <div class="main-layout">
                <div class="sidebar">
                    <div class="section-title">メニュー</div>
                    <button class="action-card btn-cust" type="button" onclick="showFormForCreate()">
                        <div class="action-header">🆕 顧客登録</div>
                        <div class="action-desc">新規顧客と車両をセット登録。</div>
                    </button>
                    <button class="action-card btn-search" type="button" onclick="showPage('page-search')">
                        <div class="action-header">🔍 車両検索 / 作業記録</div>
                        <div class="action-desc">車両ナンバー検索・実績入力。</div>
                    </button>
                    <button class="action-card btn-shaken" type="button" onclick="showPage('page-shaken-reg')">
                        <div class="action-header">📋 車検予約</div>
                        <div class="action-desc">未来の車検スケジュールを確保。</div>
                    </button>
                    <button class="action-card btn-info" type="button" onclick="showPage('page-plan-reg')">
                        <div class="action-header">📅 一般予約</div>
                        <div class="action-desc">オイル交換や点検の予約登録。</div>
                    </button>
                </div>

                <div class="calendar-section">
                    <div class="section-title" id="calendar-title">スケジュール・作業実績 (2026年6月)</div>
                    <div class="calendar-container">
                        <table class="calendar-table">
                            <thead>
                                <tr>
                                    <th style="color:#f87171">日</th>
                                    <th>月</th>
                                    <th>火</th>
                                    <th>水</th>
                                    <th>木</th>
                                    <th>金</th>
                                    <th style="color:#60a5fa">土</th>
                                </tr>
                            </thead>
                            <tbody id="calendar-body">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="summary-bar">
                <div>📊 スプレッドシート連携ステータス</div>
                <div id="sync-status" style="color:#34d399; font-weight:bold;">🟢 オンライン（接続完了）</div>
            </div>
        </div>

        <div id="page-cust" class="page">
            <button class="btn-back-nav" type="button" onclick="showPage('page-top')">← トップに戻る</button>
            <form id="form-customer" onsubmit="handleFormSubmit(event)">
                <div class="form-section">
                    <div class="section-title" id="form-section-title-car" style="color:#38bdf8">🚗 1. 車両情報の登録 ＆ ナンバー検索</div>
                    <div class="form-grid">
                        <div class="form-group full-width">
                            <label>登録番号（ナンバー）</label>
                            <div style="display: flex; gap: 8px; width: 100%;">
                                <input type="text" id="car-number" placeholder="例：板橋 あ 1111" required style="flex-grow: 1;">
                                <button type="button" class="btn-inline-search" onclick="searchCarFromRegistrationField()">🔍 車両検索</button>
                            </div>
                            <div style="margin-top: 6px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                                <span id="cust-register-search-status" style="font-size: 9pt; font-weight: bold; color: #fbbf24;"></span>
                            </div>
                        </div>
                        <div class="form-group"><label>車種</label><input type="text" id="car-model" required></div>
                        <div class="form-group"><label>車台番号</label><input type="text" id="car-vin" required></div>
                        <div class="form-group"><label>初度登録年月</label><input type="text" id="car-date" required></div>
                    </div>
                </div>
                
                <div class="form-section" id="form-section-documents" style="display: none;">
                    <div class="section-title" style="color:#a78bfa">📂 2. 顧客フォルダー・スキャン書類管理</div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>書類の分類を選択</label>
                            <select id="upload-doc-type">
                                <option value="受付表">📋 受付表</option>
                                <option value="点検記録簿">🛠️ 点検記録簿</option>
                                <option value="自賠責保険">🛡️ 自賠責保険</option>
                                <option value="請求書">🪙 請求書</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>スキャンしたPDFファイルを選択</label>
                            <input type="file" id="upload-doc-file" accept="application/pdf" style="padding:5px !important;">
                        </div>
                        <div class="form-group full-width">
                            <button type="button" class="btn-inline-search" style="background:#a78bfa; color:#0f172a;" onclick="uploadScannedPDF()">⚡ ドライブに保管する</button>
                        </div>
                        <div class="form-group full-width">
                            <label>現在このフォルダに保管中の書類一覧</label>
                            <div id="stored-docs-container" style="background:#0f172a; padding:12px; border-radius:6px; min-height:45px; display:flex; flex-wrap:wrap; gap:6px;">
                                <span style="color:#64748b; font-size:9pt;">現在書類はありません。</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <div class="section-title" id="form-section-title-cust" style="color:#38bdf8">👤 3. 顧客情報の入力</div>
                    <div class="form-grid" style="margin-top:15px;">
                        <div class="form-group"><label>お名前</label><input type="text" id="cust-name" required></div>
                        <div class="form-group"><label>フリガナ</label><input type="text" id="cust-ruby" required></div>
                        <div class="form-group"><label>電話番号</label><input type="tel" id="cust-tel" required></div>
                        <div class="form-group full-width"><label>ご住所</label><input type="text" id="cust-address" required></div>
                    </div>
                    
                    <input type="hidden" id="cust-store-hidden">
                    <input type="hidden" id="cust-id-hidden">

                    <div id="form-action-buttons-container" style="margin-top: 25px;">
                        <button type="submit" id="btn-submit-create" class="btn-submit-form" style="background:#38bdf8;">📁 新規登録する</button>
                    </div>
                </div>
            </form>
        </div>

        <div id="page-search" class="page">
            <button class="btn-back-nav" type="button" onclick="showPage('page-top')">← トップに戻る</button>
            <div class="form-section">
                <div class="section-title" id="search-title-text" style="color:#fbbf24">🔍 来店車両の検索・作業記録</div>
                <div class="form-grid" style="margin-top:15px;">
                    <div class="form-group full-width"><label>車両ナンバー</label><input type="text" id="search-car-number" placeholder="例：1111"></div>
                </div>
                <button class="btn-submit-form" type="button" style="margin-top:15px; background:#fbbf24;" onclick="simulateSearchAction()">検索する</button>
            </div>
            <div class="section-title">顧客フォルダー検索結果</div>
            <table class="result-table">
                <thead><tr><th>管理店舗 / 顧客名</th><th>車両ナンバー / 車種</th><th>操作</th></tr></thead>
                <tbody id="search-table-rows">
                    <tr><td colspan="3" style="text-align:center; color:#94a3b8;">【検索する】ボタンを押すとリアルタイム表示されます。</td></tr>
                </tbody>
            </table>
        </div>

        <div id="page-instant-work" class="page">
            <button class="btn-back-nav" type="button" onclick="showPage('page-search')">← 検索結果に戻る</button>
            <form id="form-work" onsubmit="submitWork(event)">
                <div class="form-section">
                    <div class="section-title" style="color:#34d399">🛠️ 実施した作業内容の登録</div>
                    <div style="background:#0f172a; padding:12px; border-radius:6px; margin: 15px 0; font-size:9.5pt;">
                        <strong>対象顧客:</strong> <span id="work-target-display" style="color:#34d399; font-weight:bold;">-</span>
                    </div>
                    <div class="form-grid">
                        <div class="form-group"><label>作業実施日</label><input type="date" id="work-date" required></div>
                        <div class="form-group">
                            <label>作業の分類</label>
                            <select id="work-
